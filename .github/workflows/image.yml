name: build and publish image

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMG: nginx-http3
  DOCKERHUB_IMG: docker-nginx-brotli

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set environment variables
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          GIT_SHA=$(echo '${{ github.sha }}' | cut -c1-7)
          GIT_REF=$(git symbolic-ref -q --short HEAD || git describe --tags --exact-match || echo "${GITHUB_REF_NAME}")
          VCS_REF=$(git rev-parse --short HEAD)
          GHCR_IMAGE="ghcr.io/${REPO_OWNER,,}/${IMG}"

          if [ "$GIT_REF" = "master" ]; then
            PUBLISH_REF_TAG=false
          else
            PUBLISH_REF_TAG=true
          fi

          if [ -n "$DOCKER_USERNAME" ] && [ -n "$DOCKER_PASSWORD" ]; then
            HAS_DOCKERHUB=true
          else
            HAS_DOCKERHUB=false
          fi

          {
            echo "BUILD_VER=1.0.${GITHUB_RUN_NUMBER}"
            echo "GHCR_IMAGE=${GHCR_IMAGE}"
            echo "BUILD_DATE=${BUILD_DATE}"
            echo "GIT_SHA=${GIT_SHA}"
            echo "GIT_REF=${GIT_REF}"
            echo "VCS_REF=${VCS_REF}"
            echo "HAS_DOCKERHUB=${HAS_DOCKERHUB}"
            echo "PUBLISH_REF_TAG=${PUBLISH_REF_TAG}"
          } >> "$GITHUB_ENV"

          {
            echo 'IMAGE_TAGS<<EOF'
            echo "${GHCR_IMAGE}:latest"
            if [ "$PUBLISH_REF_TAG" = "true" ]; then
              echo "${GHCR_IMAGE}:${GIT_REF}"
            fi
            echo "${GHCR_IMAGE}:${GIT_SHA}"
            if [ "$HAS_DOCKERHUB" = "true" ]; then
              echo "${DOCKER_USERNAME}/${DOCKERHUB_IMG}:latest"
              if [ "$PUBLISH_REF_TAG" = "true" ]; then
                echo "${DOCKER_USERNAME}/${DOCKERHUB_IMG}:${GIT_REF}"
              fi
              echo "${DOCKER_USERNAME}/${DOCKERHUB_IMG}:${GIT_SHA}"
            fi
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: env.HAS_DOCKERHUB == 'true'
        uses: docker/login-action@v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7.2.0
        with:
          labels: |
            org.opencontainers.image.authors=${{ github.repository_owner }}
            org.opencontainers.image.created=${{ env.BUILD_DATE }}
            org.opencontainers.image.description=Created from commit ${{ env.GIT_SHA }} and ref ${{ env.GIT_REF }}
            org.opencontainers.image.ref.name=${{ env.GIT_REF }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ env.BUILD_VER }}
          tags: ${{ env.IMAGE_TAGS }}
          build-args: |
            BUILD_DATE=${{ env.BUILD_DATE }}
            VCS_REF=${{ env.VCS_REF }}
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v6,linux/arm/v7
          sbom: true
          provenance: mode=max

      - name: Verify published image manifests
        env:
          EXPECTED_PLATFORMS: linux/amd64 linux/arm64 linux/arm/v6 linux/arm/v7
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail

          printf '%s\n' \
            'import json' \
            'import os' \
            'import sys' \
            '' \
            'manifest = json.load(sys.stdin)' \
            'expected = set(os.environ["EXPECTED_PLATFORMS"].split())' \
            'found = set()' \
            'for item in manifest.get("manifests", []):' \
            '    platform = item.get("platform") or {}' \
            '    os_name = platform.get("os")' \
            '    arch = platform.get("architecture")' \
            '    if os_name and arch and os_name != "unknown" and arch != "unknown":' \
            '        variant = platform.get("variant")' \
            '        value = f"{os_name}/{arch}"' \
            '        if variant:' \
            '            value = f"{value}/{variant}"' \
            '        found.add(value)' \
            '' \
            'missing = sorted(expected - found)' \
            'if missing:' \
            '    print("missing expected platforms: " + ", ".join(missing), file=sys.stderr)' \
            '    print("found platforms: " + ", ".join(sorted(found)), file=sys.stderr)' \
            '    sys.exit(1)' \
            '' \
            'print("manifest verification passed: " + ", ".join(sorted(found)))' \
            > /tmp/verify_manifest.py

          if [ -z "${IMAGE_DIGEST}" ]; then
            echo "build-push-action did not expose an image digest" >&2
            exit 1
          fi

          echo "Published digest: ${IMAGE_DIGEST}"
          echo "Expected platforms: ${EXPECTED_PLATFORMS}"

          verify_ref() {
            local image_ref="$1"

            echo "Verifying ${image_ref}"

            resolved_digest=""
            for attempt in $(seq 1 12); do
              if inspect_output="$(docker buildx imagetools inspect "${image_ref}" 2>&1)"; then
                resolved_digest="$(awk '/^Digest:/ { print $2; exit }' <<< "${inspect_output}")"
                if [ -n "${resolved_digest}" ]; then
                  break
                fi
              fi

              echo "Manifest for ${image_ref} is not inspectable yet (attempt ${attempt}/12)."
              if [ "${attempt}" -eq 12 ]; then
                echo "${inspect_output:-docker buildx imagetools inspect produced no output}" >&2
                exit 1
              fi
              sleep 15
            done

            if [ "${resolved_digest}" != "${IMAGE_DIGEST}" ]; then
              echo "digest mismatch for ${image_ref}: expected ${IMAGE_DIGEST}, got ${resolved_digest}" >&2
              exit 1
            fi

            raw_manifest_file="$(mktemp)"
            raw_manifest_error_file="$(mktemp)"
            for attempt in $(seq 1 12); do
              if docker buildx imagetools inspect --raw "${image_ref}" > "${raw_manifest_file}" 2> "${raw_manifest_error_file}" \
                && EXPECTED_PLATFORMS="${EXPECTED_PLATFORMS}" python3 /tmp/verify_manifest.py < "${raw_manifest_file}"; then
                rm -f "${raw_manifest_file}" "${raw_manifest_error_file}"
                return
              fi

              echo "Raw manifest for ${image_ref} is not verifiable yet (attempt ${attempt}/12)."
              if [ "${attempt}" -eq 12 ]; then
                echo "docker buildx imagetools inspect --raw stderr:" >&2
                cat "${raw_manifest_error_file}" >&2 || true
                echo "raw manifest stdout:" >&2
                cat "${raw_manifest_file}" >&2 || true
                rm -f "${raw_manifest_file}" "${raw_manifest_error_file}"
                exit 1
              fi
              sleep 15
            done
          }

          while IFS= read -r image_ref; do
            [ -n "${image_ref}" ] || continue
            verify_ref "${image_ref}"
          done <<< "${IMAGE_TAGS}"

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign published image digests
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail

          signed_repositories=""
          while IFS= read -r image_ref; do
            [ -n "${image_ref}" ] || continue
            repository="${image_ref%:*}"
            case " ${signed_repositories} " in
              *" ${repository} "*) continue ;;
            esac

            echo "Signing ${repository}@${IMAGE_DIGEST}"
            cosign sign --yes "${repository}@${IMAGE_DIGEST}"
            signed_repositories="${signed_repositories} ${repository}"
          done <<< "${IMAGE_TAGS}"
