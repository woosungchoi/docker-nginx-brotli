name: build and publish image

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMG: nginx-http3
  DOCKERHUB_IMG: docker-nginx-brotli

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set environment variables
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          GIT_SHA=$(echo '${{ github.sha }}' | cut -c1-7)
          GIT_REF=$(git symbolic-ref -q --short HEAD || git describe --tags --exact-match || echo "${GITHUB_REF_NAME}")
          VCS_REF=$(git rev-parse --short HEAD)
          GHCR_IMAGE="ghcr.io/${REPO_OWNER,,}/${IMG}"

          if [ "$GIT_REF" = "master" ]; then
            PUBLISH_REF_TAG=false
          else
            PUBLISH_REF_TAG=true
          fi

          if [ -n "$DOCKER_USERNAME" ] && [ -n "$DOCKER_PASSWORD" ]; then
            HAS_DOCKERHUB=true
          else
            HAS_DOCKERHUB=false
          fi

          echo "BUILD_VER=1.0.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "GHCR_IMAGE=${GHCR_IMAGE}" >> "$GITHUB_ENV"
          echo "BUILD_DATE=${BUILD_DATE}" >> "$GITHUB_ENV"
          echo "GIT_SHA=${GIT_SHA}" >> "$GITHUB_ENV"
          echo "GIT_REF=${GIT_REF}" >> "$GITHUB_ENV"
          echo "VCS_REF=${VCS_REF}" >> "$GITHUB_ENV"
          echo "HAS_DOCKERHUB=${HAS_DOCKERHUB}" >> "$GITHUB_ENV"
          echo "PUBLISH_REF_TAG=${PUBLISH_REF_TAG}" >> "$GITHUB_ENV"

          {
            echo 'IMAGE_TAGS<<EOF'
            echo "${GHCR_IMAGE}:latest"
            if [ "$PUBLISH_REF_TAG" = "true" ]; then
              echo "${GHCR_IMAGE}:${GIT_REF}"
            fi
            echo "${GHCR_IMAGE}:${GIT_SHA}"
            if [ "$HAS_DOCKERHUB" = "true" ]; then
              echo "${DOCKER_USERNAME}/${DOCKERHUB_IMG}:latest"
              if [ "$PUBLISH_REF_TAG" = "true" ]; then
                echo "${DOCKER_USERNAME}/${DOCKERHUB_IMG}:${GIT_REF}"
              fi
              echo "${DOCKER_USERNAME}/${DOCKERHUB_IMG}:${GIT_SHA}"
            fi
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: env.HAS_DOCKERHUB == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          labels: |
            org.opencontainers.image.authors=${{ github.repository_owner }}
            org.opencontainers.image.created=${{ env.BUILD_DATE }}
            org.opencontainers.image.description=Created from commit ${{ env.GIT_SHA }} and ref ${{ env.GIT_REF }}
            org.opencontainers.image.ref.name=${{ env.GIT_REF }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ env.BUILD_VER }}
          tags: ${{ env.IMAGE_TAGS }}
          build-args: |
            BUILD_DATE=${{ env.BUILD_DATE }}
            VCS_REF=${{ env.VCS_REF }}
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v6,linux/arm/v7
